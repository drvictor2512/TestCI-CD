name: CI/CD Docker Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push Auth Service
      - name: Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./auth_service
          push: true
          tags: thangtranvan2512/e-commerce_project-auth-service:latest

      # Build & Push API Gateway
      - name: API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: thangtranvan2512/e-commerce_project-api-gateway:latest

      # Build & Push E-commerce Service
      - name: E-commerce Service
        uses: docker/build-push-action@v5
        with:
          context: ./e_commerce_service
          push: true
          tags: thangtranvan2512/e-commerce_project-ecommerce-service:latest